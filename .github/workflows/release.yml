name: Build and release

on:
  push:
    branches:
      - main
    tags:
      - 'v*'
  pull_request:
    branches:
      - main
  workflow_dispatch:

concurrency:
  group: extension-release-${{ github.ref }}
  cancel-in-progress: true

permissions:
  contents: write

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repository
        uses: actions/checkout@v6
        with:
          fetch-depth: 0

      - name: Setup Node.js
        uses: actions/setup-node@v6
        with:
          node-version: '22'
          cache: npm

      - name: Use the project npm version
        run: npm install --global npm@11.17.0

      - name: Verify Node.js and npm
        run: |
          node --version
          npm --version

      - name: Install locked dependencies
        run: npm ci

      - name: Verify source and both browser builds
        run: npm run verify

      - name: Create Chromium and Firefox ZIP files
        run: npm run package

      - name: Read package version
        shell: bash
        run: echo "VERSION=$(node -p "require('./package.json').version")" >> "$GITHUB_ENV"

      - name: Write package and update details
        env:
          COMMIT_MESSAGE: ${{ github.event.head_commit.message || github.event.pull_request.title || github.ref_name }}
          RUN_URL: ${{ github.server_url }}/${{ github.repository }}/actions/runs/${{ github.run_id }}
          COMMIT_URL: ${{ github.server_url }}/${{ github.repository }}/commit/${{ github.sha }}
        shell: bash
        run: |
          {
            printf '# uBlock Ultimate %s\n\n' "$VERSION"
            printf 'Bloqueador de contenido Manifest V3 eficiente, sin telemetría y preparado para Chromium, Firefox Desktop y Firefox para Android.\n\n'
            printf 'Esta compilación fue verificada automáticamente desde el commit [`%s`](%s).\n\n' \
              "${GITHUB_SHA:0:7}" "$COMMIT_URL"
            printf '## Descargas\n\n'
            printf '| Navegador | Archivo | Uso |\n'
            printf '| --- | --- | --- |\n'
            printf '| Google Chrome y Chromium MV3 | `uBlock-Ultimate-%s-chromium.zip` | Descomprimir y cargar desde `chrome://extensions` |\n' "$VERSION"
            printf '| Firefox Desktop y Android | `uBlock-Ultimate-%s-firefox.zip` | Paquete validado para firma o instalación temporal |\n\n' "$VERSION"
            printf 'Los ZIP contienen únicamente la extensión instalable. No incluyen el código fuente del proyecto, pruebas, herramientas, dependencias ni archivos internos de GitHub.\n\n'
            printf '## Características principales\n\n'
            printf -- '- Bloqueo de anuncios, rastreadores, malware y parámetros de seguimiento.\n'
            printf -- '- Listas y protecciones opcionales activables desde la interfaz.\n'
            printf -- '- Filtros propios, reglas dinámicas, logger, picker y zapper.\n'
            printf -- '- Interfaz adaptable para escritorio y dispositivos móviles compatibles.\n'
            printf -- '- Sin telemetría ni transmisión de datos de uso.\n\n'
            printf '## Instalación\n\n'
            printf '### Chrome / Chromium\n\n'
            printf '1. Descargar y descomprimir el ZIP de Chromium.\n'
            printf '2. Abrir `chrome://extensions` y activar **Modo de desarrollador**.\n'
            printf '3. Elegir **Cargar descomprimida** y seleccionar la carpeta extraída.\n\n'
            printf '### Firefox\n\n'
            printf 'El ZIP de Firefox supera la validación automatizada, pero Mozilla exige firma para una instalación permanente. Para pruebas temporales en escritorio se puede cargar su `manifest.json` desde `about:debugging`.\n\n'
            printf '## Verificación\n\n'
            printf -- '- Actualización: %s\n' "$COMMIT_MESSAGE"
            printf -- '- Ejecución: [GitHub Actions](%s)\n' "$RUN_URL"
            printf -- '- Licencia: GPL-3.0-only\n'
            printf -- '- Código base acreditado: [uBlock Origin](https://github.com/gorhill/uBlock)\n\n'
            printf '### SHA-256\n\n'
            while read -r hash filename; do
              printf -- '- `%s` — `%s`\n' "$filename" "$hash"
            done < dist/release/SHA256SUMS.txt
          } > dist/release/RELEASE_NOTES.md

      - name: Require version tag to match package.json
        if: startsWith(github.ref, 'refs/tags/v')
        shell: bash
        run: test "$GITHUB_REF_NAME" = "v$VERSION"

      - name: Sign Firefox package with Mozilla
        if: startsWith(github.ref, 'refs/tags/v')
        env:
          AMO_JWT_ISSUER: ${{ secrets.AMO_JWT_ISSUER }}
          AMO_JWT_SECRET: ${{ secrets.AMO_JWT_SECRET }}
        shell: bash
        run: |
          if [[ -z "$AMO_JWT_ISSUER" || -z "$AMO_JWT_SECRET" ]]; then
            echo "Mozilla secrets are not configured; publishing the Firefox ZIP without a signed XPI."
            exit 0
          fi
          mkdir -p dist/release/signed
          npx web-ext sign \
            --source-dir platform/firefox \
            --artifacts-dir dist/release/signed \
            --channel unlisted \
            --api-key "$AMO_JWT_ISSUER" \
            --api-secret "$AMO_JWT_SECRET"
          signed_xpi="$(find dist/release/signed -maxdepth 1 -name '*.xpi' -print -quit)"
          test -n "$signed_xpi"
          cp "$signed_xpi" "dist/release/uBlock-Ultimate-${VERSION}-firefox-signed.xpi"
          sha256sum "dist/release/uBlock-Ultimate-${VERSION}-firefox-signed.xpi" >> dist/release/SHA256SUMS.txt

      - name: Upload install packages from every build
        uses: actions/upload-artifact@v4
        with:
          name: uBlock-Ultimate-${{ env.VERSION }}-${{ github.run_number }}
          path: |
            dist/release/uBlock-Ultimate-${{ env.VERSION }}-chromium.zip
            dist/release/uBlock-Ultimate-${{ env.VERSION }}-firefox.zip
            dist/release/uBlock-Ultimate-${{ env.VERSION }}-firefox-signed.xpi
            dist/release/SHA256SUMS.txt
            dist/release/RELEASE_NOTES.md
          if-no-files-found: error
          retention-days: 30

      - name: Move rolling release tag to current main
        if: github.event_name == 'push' && github.ref == 'refs/heads/main'
        shell: bash
        run: |
          git tag --force continuous "$GITHUB_SHA"
          git push origin refs/tags/continuous --force

      - name: Create or update automatic main release
        if: github.event_name == 'push' && github.ref == 'refs/heads/main'
        env:
          GH_TOKEN: ${{ github.token }}
        shell: bash
        run: |
          bash .github/scripts/publish-release.sh \
            continuous \
            "uBlock Ultimate $VERSION - Latest" \
            dist/release/RELEASE_NOTES.md \
            continuous \
            dist/release/uBlock-Ultimate-${{ env.VERSION }}-chromium.zip \
            dist/release/uBlock-Ultimate-${{ env.VERSION }}-firefox.zip \
            dist/release/SHA256SUMS.txt

      - name: Create versioned release
        if: startsWith(github.ref, 'refs/tags/v')
        env:
          GH_TOKEN: ${{ github.token }}
        shell: bash
        run: |
          assets=(
            dist/release/uBlock-Ultimate-${{ env.VERSION }}-chromium.zip
            dist/release/uBlock-Ultimate-${{ env.VERSION }}-firefox.zip
            dist/release/SHA256SUMS.txt
          )
          signed_xpi="dist/release/uBlock-Ultimate-${{ env.VERSION }}-firefox-signed.xpi"
          if [[ -f "$signed_xpi" ]]; then
            assets+=("$signed_xpi")
          fi
          bash .github/scripts/publish-release.sh \
            "$GITHUB_REF_NAME" \
            "uBlock Ultimate $VERSION" \
            dist/release/RELEASE_NOTES.md \
            versioned \
            "${assets[@]}"
