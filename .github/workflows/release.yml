name: Release

on:
  push:
    tags:
      - 'v*' # Trigger on tags like v0.2.0
  workflow_dispatch: # Allows manual triggering from GitHub Actions tab

jobs:
  release:
    runs-on: ubuntu-latest
    permissions:
      contents: write # Needed to create a release

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '22'
          cache: 'npm'

      - name: Install dependencies
        run: npm ci

      - name: Verify code (Typecheck, Lint, Test, Build, Audit)
        run: npm run verify

      - name: Package extension
        run: npm run package

      - name: Get version from package.json
        id: get_version
        run: echo "VERSION=$(node -p "require('./package.json').version")" >> $GITHUB_ENV

      - name: Create GitHub Release
        uses: softprops/action-gh-release@v2
        if: startsWith(github.ref, 'refs/tags/')
        with:
          files: dist/release/uBlock-Ultimate-${{ env.VERSION }}-chromium.zip
          generate_release_notes: true # Generates a changelog automatically based on PRs and commits
